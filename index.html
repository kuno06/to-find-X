<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X를 찾아서</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0a0907;
    --sand-deep: #1a1611;
    --sand: #2a2419;
    --dust: #6b5d44;
    --bone: #c4b896;
    --pale: #e8dfc8;
    --light: #f4ecd6;
    --ember: #d99a4e;
    --ember-soft: #e8b873;
    --water: #6ba3b0;
    --water-soft: #9fc8d0;
    --blood: #8a4332;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow-x: hidden; }
  body {
    font-family: 'Gowun Batang', serif;
    background: var(--void);
    color: var(--pale);
    line-height: 1.9;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .atmosphere {
    position: fixed; inset: 0; z-index: 0;
    transition: background 4s ease-in-out;
    background:
      radial-gradient(ellipse 120% 80% at 50% 120%, var(--sand) 0%, transparent 60%),
      radial-gradient(ellipse 100% 60% at 50% -20%, var(--sand-deep) 0%, transparent 50%),
      var(--void);
  }
  .atmosphere.water-scene {
    background:
      radial-gradient(ellipse 120% 80% at 50% 120%, #1a3a40 0%, transparent 60%),
      radial-gradient(ellipse 100% 60% at 50% -20%, #14282e 0%, transparent 50%),
      #060d0f;
  }
  .atmosphere.dark-scene {
    background:
      radial-gradient(ellipse 100% 60% at 50% 50%, #14110c 0%, transparent 70%),
      var(--void);
  }
  .grain {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none; opacity: 0.04;
    background-image:
      repeating-radial-gradient(circle at 17% 23%, var(--bone) 0px, transparent 1px),
      repeating-radial-gradient(circle at 73% 61%, var(--bone) 0px, transparent 1px),
      repeating-radial-gradient(circle at 41% 87%, var(--bone) 0px, transparent 1px);
    background-size: 13px 13px, 19px 19px, 23px 23px;
  }
  .dust-particle {
    position: fixed; width: 2px; height: 2px;
    background: var(--bone); border-radius: 50%;
    opacity: 0; z-index: 2; pointer-events: none;
  }
  .game {
    position: relative; z-index: 3;
    max-width: 680px; margin: 0 auto;
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    padding: 4rem 1.8rem;
  }
  .title-screen { text-align: center; animation: slowFade 3s ease-out; }
  @keyframes slowFade { from { opacity: 0; } to { opacity: 1; } }
  .title-art { width: 100%; max-width: 360px; margin: 0 auto 1.5rem; display: block; }
  .title-mark {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(3.5rem, 15vw, 7rem);
    font-weight: 800; color: var(--ember);
    line-height: 1; letter-spacing: 0.05em;
    text-shadow: 0 0 60px rgba(217, 154, 78, 0.3);
    margin-bottom: 0.3rem;
    animation: emberGlow 6s ease-in-out infinite;
  }
  @keyframes emberGlow {
    0%, 100% { text-shadow: 0 0 60px rgba(217, 154, 78, 0.25); }
    50% { text-shadow: 0 0 90px rgba(217, 154, 78, 0.45); }
  }
  .title-name {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(1.4rem, 4.5vw, 2rem);
    font-weight: 700; color: var(--light);
    letter-spacing: 0.35em; margin-bottom: 2rem;
    padding-left: 0.35em;
  }
  .title-line { width: 60px; height: 1px; background: var(--dust); margin: 0 auto 2rem; }
  .title-desc {
    color: var(--bone); font-size: 1rem; line-height: 2;
    margin-bottom: 2.5rem; opacity: 0.85;
  }
  .title-desc .quiet { color: var(--dust); font-size: 0.92rem; }
  .scene { display: none; }
  .scene.active { display: block; }
  .chapter-mark {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 0.8rem; letter-spacing: 0.3em;
    color: var(--dust); text-align: center;
    margin-bottom: 2rem; opacity: 0;
    animation: fadeIn 2s ease-out forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }
  .scene-illustration {
    width: 100%; margin: 0 auto 2.5rem; display: block;
    opacity: 0; filter: blur(10px);
    animation: illusReveal 2.6s ease-out forwards;
  }
  @keyframes illusReveal {
    from { opacity: 0; filter: blur(10px); transform: scale(1.04); }
    to { opacity: 1; filter: blur(0); transform: scale(1); }
  }
  .narration { font-size: 1.12rem; color: var(--pale); margin-bottom: 1.5rem; min-height: 1.9em; }
  .narration p { margin-bottom: 1.3rem; opacity: 0; animation: lineRise 1.2s ease-out forwards; }
  @keyframes lineRise {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .narration p.pause {
    color: var(--dust); text-align: center;
    letter-spacing: 0.3em; font-size: 1.4rem;
  }
  .narration p.whisper {
    color: var(--bone); font-style: italic;
    text-align: center; font-size: 1.05rem;
  }
  .narration p.x-voice {
    color: var(--ember-soft); font-family: 'Nanum Myeongjo', serif;
    text-align: center; font-size: 1.25rem; letter-spacing: 0.04em;
    text-shadow: 0 0 30px rgba(217, 154, 78, 0.3); margin: 2rem 0;
  }
  .narration p.letter {
    color: var(--light); background: rgba(196, 184, 150, 0.06);
    border-left: 2px solid var(--ember); padding: 1.2rem 1.5rem;
    font-size: 1.1rem; line-height: 1.8;
  }
  .narration p.water-voice {
    color: var(--water-soft); font-family: 'Nanum Myeongjo', serif;
    text-align: center; font-size: 1.25rem; letter-spacing: 0.04em;
    text-shadow: 0 0 30px rgba(107, 163, 176, 0.4); margin: 2rem 0;
  }
  .photo {
    border: 1px solid var(--sand); background: rgba(0,0,0,0.3);
    padding: 1rem; margin: 1.5rem 0; opacity: 0;
    animation: photoFade 1.8s ease-out forwards;
  }
  @keyframes photoFade {
    from { opacity: 0; filter: blur(8px); }
    to { opacity: 1; filter: blur(0); }
  }
  .photo .frame { border: 1px solid var(--dust); padding: 1rem; text-align: center; }
  .photo .photo-art { width: 100%; max-width: 320px; margin: 0 auto 0.9rem; display: block; }
  .photo .photo-label {
    font-size: 0.75rem; letter-spacing: 0.25em;
    color: var(--dust); margin-bottom: 0.8rem;
  }
  .photo .photo-desc { color: var(--bone); font-size: 1.02rem; line-height: 1.8; }
  .choices { margin-top: 2.5rem; display: flex; flex-direction: column; gap: 0.8rem; opacity: 0; }
  .choices.show { animation: choicesRise 1.4s ease-out forwards; }
  @keyframes choicesRise {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .choice {
    background: transparent; border: 1px solid var(--sand);
    color: var(--pale); font-family: 'Gowun Batang', serif;
    font-size: 1.02rem; padding: 1.1rem 1.4rem;
    text-align: left; cursor: pointer;
    transition: all 0.5s cubic-bezier(0.2, 0, 0.2, 1);
    line-height: 1.6; position: relative;
  }
  .choice::before {
    content: '—'; color: var(--dust);
    margin-right: 0.8rem; transition: color 0.5s, margin 0.5s;
  }
  .choice:hover {
    border-color: var(--ember); color: var(--light);
    background: rgba(217, 154, 78, 0.05); padding-left: 1.8rem;
  }
  .choice:hover::before { color: var(--ember); }
  .continue { margin-top: 2.5rem; text-align: center; opacity: 0; }
  .continue.show { animation: choicesRise 1.4s ease-out forwards; }
  .continue button {
    background: transparent; border: none; color: var(--dust);
    font-family: 'Nanum Myeongjo', serif; font-size: 0.9rem;
    letter-spacing: 0.3em; cursor: pointer;
    padding: 0.8rem 2rem; transition: color 0.5s;
  }
  .continue button:hover { color: var(--ember); }
  .continue button::after { content: ' ›'; }
  .ending { text-align: center; }
  .ending-mark {
    font-family: 'Nanum Myeongjo', serif; font-size: 0.8rem;
    letter-spacing: 0.4em; color: var(--dust); margin-bottom: 2rem;
  }
  .ending-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    font-weight: 800; margin-bottom: 2rem; line-height: 1.4;
  }
  .ending-title.true { color: var(--water-soft); text-shadow: 0 0 50px rgba(107, 163, 176, 0.35); }
  .ending-title.bad { color: var(--dust); }
  .ending-verse {
    font-family: 'Nanum Myeongjo', serif; color: var(--bone);
    font-size: 1.1rem; line-height: 2.1; margin: 2rem 0; padding: 0 1rem;
  }
  .ending-verse cite {
    display: block; margin-top: 1rem; font-style: normal;
    font-size: 0.9rem; color: var(--dust); letter-spacing: 0.15em;
  }
  .controls {
    position: fixed; top: 1.5rem; right: 1.5rem; z-index: 10;
    display: flex; gap: 0.8rem;
  }
  .ctrl-btn {
    background: rgba(10, 9, 7, 0.6); border: 1px solid var(--sand);
    color: var(--dust); width: 38px; height: 38px;
    border-radius: 50%; cursor: pointer; font-size: 0.9rem;
    transition: all 0.3s; backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:hover { color: var(--ember); border-color: var(--ember); }
  .stats-panel {
    position: fixed; top: 4.5rem; right: 1.5rem; z-index: 10;
    background: rgba(10, 9, 7, 0.92); border: 1px solid var(--sand);
    padding: 1.2rem 1.4rem; width: 200px; display: none;
    backdrop-filter: blur(8px);
  }
  .stats-panel.show { display: block; animation: fadeIn 0.4s ease-out forwards; opacity: 1; }
  .stats-panel h4 {
    font-family: 'Nanum Myeongjo', serif; font-size: 0.75rem;
    letter-spacing: 0.2em; color: var(--dust);
    margin-bottom: 1rem; text-align: center;
  }
  .stat-line { margin-bottom: 0.9rem; }
  .stat-line:last-child { margin-bottom: 0; }
  .stat-line .stat-name {
    font-size: 0.8rem; color: var(--bone);
    display: flex; justify-content: space-between; margin-bottom: 0.3rem;
  }
  .stat-bar { height: 3px; background: var(--sand); overflow: hidden; }
  .stat-fill { height: 100%; transition: width 1s ease-out; }
  .stat-fill.water { background: var(--water); }
  .stat-fill.faith { background: var(--ember); }
  .stat-fill.confusion { background: var(--blood); }
  .fade-overlay {
    position: fixed; inset: 0; background: var(--void); z-index: 50;
    opacity: 0; pointer-events: none; transition: opacity 1.2s ease-in-out;
  }
  .fade-overlay.active { opacity: 1; pointer-events: all; }
  .start-btn {
    background: transparent; border: 1px solid var(--ember);
    color: var(--ember-soft); font-family: 'Nanum Myeongjo', serif;
    font-size: 1rem; letter-spacing: 0.3em;
    padding: 1rem 3rem; cursor: pointer; transition: all 0.5s;
    padding-left: calc(3rem + 0.3em);
  }
  .start-btn:hover {
    background: rgba(217, 154, 78, 0.08); color: var(--light);
    box-shadow: 0 0 40px rgba(217, 154, 78, 0.15);
  }
  .resume-link {
    display: block; margin-top: 1.5rem; background: none; border: none;
    color: var(--dust); font-family: 'Gowun Batang', serif;
    font-size: 0.85rem; letter-spacing: 0.15em;
    cursor: pointer; transition: color 0.4s;
  }
  .resume-link:hover { color: var(--bone); }
  @media (max-width: 520px) {
    .game { padding: 3rem 1.4rem; }
    .narration { font-size: 1.05rem; }
  }
</style>
</head>
<body>

<div class="atmosphere" id="atmosphere"></div>
<div class="grain"></div>

<div class="controls">
  <button class="ctrl-btn" onclick="toggleStats()" title="상태">◷</button>
  <button class="ctrl-btn" onclick="confirmRestart()" title="처음부터">↺</button>
</div>

<div class="stats-panel" id="stats-panel">
  <h4>지금 너의 상태</h4>
  <div class="stat-line">
    <div class="stat-name"><span>물</span><span id="stat-water-val">—</span></div>
    <div class="stat-bar"><div class="stat-fill water" id="stat-water" style="width:0%"></div></div>
  </div>
  <div class="stat-line">
    <div class="stat-name"><span>믿음</span><span id="stat-faith-val">—</span></div>
    <div class="stat-bar"><div class="stat-fill faith" id="stat-faith" style="width:0%"></div></div>
  </div>
  <div class="stat-line">
    <div class="stat-name"><span>혼란</span><span id="stat-confusion-val">—</span></div>
    <div class="stat-bar"><div class="stat-fill confusion" id="stat-confusion" style="width:0%"></div></div>
  </div>
</div>

<div class="fade-overlay" id="fade"></div>

<div class="game">
  <div class="title-screen" id="title-screen">
    <div id="title-art-holder"></div>
    <div class="title-mark">X</div>
    <div class="title-name">를 찾아서</div>
    <div class="title-line"></div>
    <div class="title-desc">
      광야에서 눈을 떴다.<br>
      어떻게 이곳에 왔는지 기억나지 않는다.<br>
      <span class="quiet">누군가 남긴 흔적을 따라가야 한다.</span>
    </div>
    <button class="start-btn" onclick="startGame()">시 작 하 기</button>
    <button class="resume-link" id="resume-link" style="display:none;" onclick="resumeGame()">이어서 하기</button>
  </div>

  <div class="scene" id="scene">
    <div class="chapter-mark" id="chapter-mark"></div>
    <div id="illustration-holder"></div>
    <div class="narration" id="narration"></div>
    <div class="choices" id="choices"></div>
    <div class="continue" id="continue"></div>
  </div>
</div>

// ============================================
// 렌더링 엔진
// ============================================
const lineDelay = 900;

function setAtmosphere(mode) {
  document.getElementById('atmosphere').className = 'atmosphere' + (mode ? ' ' + mode : '');
}

function applyEffect(effect) {
  if (!effect) return;
  for (const key in effect) stats[key] = clamp(stats[key] + effect[key]);
  updateStatsPanel();
}

function renderIllustration(illustKey) {
  const holder = document.getElementById('illustration-holder');
  holder.innerHTML = '';
  if (illustKey && ILLUSTRATIONS[illustKey]) {
    const wrap = document.createElement('div');
    wrap.className = 'scene-illust';
    wrap.innerHTML = ILLUSTRATIONS[illustKey];
    holder.appendChild(wrap);
  }
}

function renderLines(lines, container, onComplete) {
  container.innerHTML = '';
  let delay = 0;
  lines.forEach((line) => {
    if (line.t === 'photo') {
      const photoDiv = document.createElement('div');
      photoDiv.className = 'photo';
      photoDiv.innerHTML = '<div class="frame"><div class="photo-label">' + line.label +
        '</div><div class="photo-desc">' + line.desc.replace(/\n/g, '<br>') + '</div></div>';
      photoDiv.style.animationDelay = delay + 'ms';
      container.appendChild(photoDiv);
      delay += 1400;
      return;
    }
    const el = document.createElement('p');
    if (line.t === 'pause') { el.className = 'pause'; el.textContent = line.text; }
    else if (line.t === 'whisper') { el.className = 'whisper'; el.textContent = line.text; }
    else if (line.t === 'x-voice') { el.className = 'x-voice'; el.innerHTML = line.text.replace(/\n/g, '<br>'); }
    else if (line.t === 'water-voice') { el.className = 'water-voice'; el.innerHTML = line.text.replace(/\n/g, '<br>'); }
    else if (line.t === 'letter') { el.className = 'letter'; el.innerHTML = line.text.replace(/\n/g, '<br>'); }
    else { el.textContent = line.text; }
    el.style.animationDelay = delay + 'ms';
    container.appendChild(el);
    delay += lineDelay;
  });
  if (onComplete) setTimeout(onComplete, delay + 300);
}

function showScene(sceneId) {
  currentScene = sceneId;
  saveGame();

  const scene = STORY[sceneId];
  if (!scene) {
    if (ENDINGS[sceneId]) { showEnding(sceneId); return; }
    console.error('Unknown scene:', sceneId);
    return;
  }

  if (scene.atmosphere !== undefined) setAtmosphere(scene.atmosphere);
  renderIllustration(scene.illust);

  const chapterMark = document.getElementById('chapter-mark');
  if (scene.chapter) {
    chapterMark.textContent = scene.chapter;
    chapterMark.style.display = 'block';
    chapterMark.style.animation = 'none';
    void chapterMark.offsetWidth;
    chapterMark.style.animation = 'fadeIn 2s ease-out forwards';
  } else {
    chapterMark.style.display = 'none';
  }

  const narration = document.getElementById('narration');
  const choicesEl = document.getElementById('choices');
  const continueEl = document.getElementById('continue');
  choicesEl.innerHTML = '';
  choicesEl.classList.remove('show');
  continueEl.innerHTML = '';
  continueEl.classList.remove('show');

  window.scrollTo({ top: 0, behavior: 'smooth' });

  renderLines(scene.lines, narration, () => {
    if (scene.choices) renderChoices(scene.choices, choicesEl);
    else if (scene.continueTo) renderContinue(scene.continueTo, continueEl);
  });
}

function renderChoices(choices, container) {
  container.innerHTML = '';
  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = choice.text;
    btn.onclick = () => { applyEffect(choice.effect); transitionTo(choice.next); };
    container.appendChild(btn);
  });
  container.classList.add('show');
}

function renderContinue(nextScene, container) {
  container.innerHTML = '';
  const btn = document.createElement('button');
  btn.textContent = '계속';
  btn.onclick = () => transitionTo(nextScene);
  container.appendChild(btn);
  container.classList.add('show');
}

function transitionTo(sceneId) {
  const fade = document.getElementById('fade');
  fade.classList.add('active');
  setTimeout(() => {
    showScene(sceneId);
    setTimeout(() => fade.classList.remove('active'), 200);
  }, 1200);
}

function showEnding(endingId) {
  currentScene = endingId;
  saveGame();
  const ending = ENDINGS[endingId];
  if (ending.atmosphere) setAtmosphere(ending.atmosphere);
  renderIllustration(ending.illust);

  document.getElementById('chapter-mark').style.display = 'none';
  const narration = document.getElementById('narration');
  const choicesEl = document.getElementById('choices');
  const continueEl = document.getElementById('continue');
  choicesEl.innerHTML = '';
  continueEl.innerHTML = '';

  window.scrollTo({ top: 0, behavior: 'smooth' });

  renderLines(ending.lines, narration, () => {
    const endDiv = document.createElement('div');
    endDiv.className = 'ending';
    endDiv.style.opacity = '0';
    endDiv.innerHTML =
      '<div class="ending-mark">' + ending.mark + '</div>' +
      '<div class="ending-title ' + ending.titleClass + '">' + ending.title + '</div>' +
      '<div class="ending-verse">' + ending.verse + '<cite>' + ending.cite + '</cite></div>' +
      '<p style="color:var(--bone); font-size:1.05rem; margin:2rem 0; line-height:1.9;">' + ending.closing + '</p>';
    continueEl.appendChild(endDiv);
    continueEl.classList.add('show');

    const restartBtn = document.createElement('button');
    restartBtn.style.cssText = 'margin-top:1.5rem; background:transparent; border:1px solid var(--dust); color:var(--bone); font-family:"Nanum Myeongjo",serif; font-size:0.9rem; letter-spacing:0.2em; padding:0.9rem 2.5rem; cursor:pointer; transition:all 0.4s;';
    restartBtn.textContent = '다시 광야에서';
    restartBtn.onmouseover = () => { restartBtn.style.borderColor = 'var(--ember)'; restartBtn.style.color = 'var(--ember-soft)'; };
    restartBtn.onmouseout = () => { restartBtn.style.borderColor = 'var(--dust)'; restartBtn.style.color = 'var(--bone)'; };
    restartBtn.onclick = () => { clearSave(); location.reload(); };
    endDiv.appendChild(restartBtn);

    setTimeout(() => { endDiv.style.transition = 'opacity 2s ease-out'; endDiv.style.opacity = '1'; }, 600);
  });
}

// ============================================
// 스탯 패널
// ============================================
function updateStatsPanel() {
  document.getElementById('stat-water').style.width = stats.water + '%';
  document.getElementById('stat-faith').style.width = stats.faith + '%';
  document.getElementById('stat-confusion').style.width = stats.confusion + '%';
  document.getElementById('stat-water-val').textContent = describeStat(stats.water);
  document.getElementById('stat-faith-val').textContent = describeStat(stats.faith);
  document.getElementById('stat-confusion-val').textContent = describeStat(stats.confusion);
}
function describeStat(v) {
  if (v >= 80) return '가득';
  if (v >= 55) return '넉넉';
  if (v >= 35) return '보통';
  if (v >= 15) return '희미';
  return '메마름';
}
function toggleStats() {
  document.getElementById('stats-panel').classList.toggle('show');
  updateStatsPanel();
}

// ============================================
// 저장 / 불러오기
// ============================================
function saveGame() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({ stats, currentScene })); } catch (e) {}
}
function loadGame() {
  try {
    const data = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (data && data.currentScene && data.currentScene !== 'start') return data;
  } catch (e) {}
  return null;
}
function clearSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
}

function startGame() {
  clearSave();
  stats = { water: 50, faith: 30, confusion: 40 };
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('scene').classList.add('active');
  const fade = document.getElementById('fade');
  fade.classList.add('active');
  setTimeout(() => {
    showScene('start');
    setTimeout(() => fade.classList.remove('active'), 200);
  }, 800);
}

function resumeGame() {
  const data = loadGame();
  if (!data) { startGame(); return; }
  stats = data.stats;
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('scene').classList.add('active');
  const fade = document.getElementById('fade');
  fade.classList.add('active');
  setTimeout(() => {
    if (ENDINGS[data.currentScene]) showEnding(data.currentScene);
    else showScene(data.currentScene);
    setTimeout(() => fade.classList.remove('active'), 200);
  }, 800);
}

function confirmRestart() {
  if (confirm('처음부터 다시 시작하시겠습니까? 지금까지의 여정은 사라집니다.')) {
    clearSave();
    location.reload();
  }
}

// ============================================
// 떠다니는 먼지 파티클
// ============================================
function spawnDust() {
  const particle = document.createElement('div');
  particle.className = 'dust-particle';
  const startX = Math.random() * window.innerWidth;
  const drift = (Math.random() - 0.5) * 200;
  const duration = 8000 + Math.random() * 8000;
  particle.style.left = startX + 'px';
  particle.style.top = (window.innerHeight + 10) + 'px';
  document.body.appendChild(particle);
  const anim = particle.animate([
    { transform: 'translate(0px, 0px)', opacity: 0 },
    { opacity: 0.5, offset: 0.1 },
    { opacity: 0.5, offset: 0.85 },
    { transform: 'translate(' + drift + 'px, -' + (window.innerHeight + 40) + 'px)', opacity: 0 }
  ], { duration, easing: 'linear' });
  anim.onfinish = () => particle.remove();
}
setInterval(spawnDust, 1400);

// ============================================
// 초기화
// ============================================
window.addEventListener('DOMContentLoaded', () => {
  if (loadGame()) document.getElementById('resume-link').style.display = 'block';
  updateStatsPanel();
});
</script>
